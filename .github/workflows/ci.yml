name: Apron Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  C3_ENV: ci

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08 # 13.4
        with:
          cli: 'latest'

      - name: Install Babashka
        run: |
          curl -sLO https://raw.githubusercontent.com/babashka/babashka/master/install
          chmod +x install
          ./install

      - name: Cache Clojure Dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-deps-${{ hashFiles('**/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Run Babashka Tests (TZ=Default)
        run: bb spec

      - name: Run Babashka Tests (TZ=CST)
        run: bb spec-cst

      - name: Run Babashka Tests (TZ=MST)
        run: bb spec-mst

      - name: Run Clojure Tests (TZ=Default)
        run: clojure -M:test:spec

      - name: Run Clojure Tests (TZ=CST)
        run: clojure -M:test:spec-cst

      - name: Run Clojure Tests (TZ=MST)
        run: clojure -M:test:spec-mst

      - name: Run ClojureScript Tests (TZ=Default)
        run: clojure -M:test:cljs once

      - name: Run ClojureScript Tests (TZ=CST)
        run: |
          bb clean
          TZ=America/Chicago clojure -M:test:cljs-cst once

      - name: Run ClojureScript Tests (TZ=MST)
        run: |
          bb clean
          TZ=America/Phoenix clojure -M:test:cljs-mst once

  security:
    uses: cleancoders/github-actions/.github/workflows/security.yml@v1
    with:
      src-paths: "src"
      clj-watson-blocking: true
      semgrep-blocking: true
